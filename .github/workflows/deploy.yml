name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  ssh-deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST_FINGERPRINT: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_HOST_FINGERPRINT" > ~/.ssh/known_hosts
      - name: Copy compose + Caddyfile
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          scp infra/docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.prod.yml"
          scp infra/Caddyfile "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/Caddyfile"
      - name: Pull + restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd $DEPLOY_PATH && IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml --env-file .env pull && IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml --env-file .env up -d"
      - name: Smoke test
        env:
          DEPLOY_DOMAIN: ${{ secrets.DEPLOY_DOMAIN }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "https://$DEPLOY_DOMAIN/healthz" >/dev/null; then
              echo "Healthcheck passed"; exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done
          echo "Healthcheck failed"; exit 1
